<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>生物医学刷题 v1.1</title>
  <style>
    :root {
      --primary: #4A90D9;
      --success: #52C41A;
      --error: #FF4D4F;
      --warning: #FAAD14;
      --anatomy: #4A90D9;
      --physiology: #52C41A;
      --biochemistry: #FF9C00;
      --pathology: #FF4D4F;
      --pathophys: #722ED1;
      --pharmacology: #13C2C2;
      --bg: #F5F7FA;
      --card-bg: #FFFFFF;
      --text: #333;
      --text-secondary: #666;
      --border: #E8E8E8;
    }
    
    [data-theme="dark"] {
      --bg: #1A1A2E;
      --card-bg: #16213E;
      --text: #E8E8E8;
      --text-secondary: #A0A0A0;
      --border: #2D3748;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
    }
    
    /* Header */
    .header {
      background: linear-gradient(135deg, var(--primary), #6B5DD3);
      color: white;
      padding: 16px 20px;
      position: relative;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    
    .header-stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
    }
    
    .header-stats span {
      opacity: 0.9;
    }
    
    /* Progress Ring */
    .progress-ring-container {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--card-bg);
      border-radius: 12px;
      margin: 12px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .progress-ring {
      position: relative;
      width: 80px;
      height: 80px;
    }
    
    .progress-ring svg {
      transform: rotate(-90deg);
      width: 80px;
      height: 80px;
    }
    
    .progress-ring circle {
      fill: none;
      stroke-width: 8;
    }
    
    .progress-ring .bg {
      stroke: var(--border);
    }
    
    .progress-ring .progress {
      stroke-linecap: round;
      transition: stroke-dashoffset 0.5s ease;
    }
    
    .progress-ring .text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    
    .progress-ring .percent {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }
    
    .progress-ring .label {
      font-size: 10px;
      color: var(--text-secondary);
    }
    
    .progress-details {
      flex: 1;
    }
    
    .progress-details h3 {
      font-size: 14px;
      margin-bottom: 8px;
    }
    
    .progress-bars {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .progress-bar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    
    .progress-bar-item .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .progress-bar-item .bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    
    .progress-bar-item .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    
    .progress-bar-item .count {
      min-width: 36px;
      text-align: right;
      color: var(--text-secondary);
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      padding: 0 16px;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    
    .tabs::-webkit-scrollbar {
      display: none;
    }
    
    .tab {
      padding: 8px 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .tab.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    
    /* Question Type Filter */
    .filter-row {
      display: flex;
      padding: 12px 16px;
      gap: 8px;
    }
    
    .filter-btn {
      flex: 1;
      padding: 10px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    
    /* Mode Toggle */
    .mode-row {
      display: flex;
      padding: 0 16px 12px;
      gap: 8px;
    }
    
    .mode-btn {
      flex: 1;
      padding: 10px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }
    
    .mode-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    
    .mode-btn svg {
      width: 16px;
      height: 16px;
    }
    
    /* Question Card */
    .question-container {
      padding: 0 16px 100px;
    }
    
    .question-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .question-subject {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      color: white;
    }
    
    .question-id {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .question-content {
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 16px;
    }
    
    .question-stars {
      display: flex;
      gap: 2px;
      margin-bottom: 12px;
    }
    
    .question-stars .star {
      color: var(--warning);
      font-size: 12px;
    }
    
    .question-stars .star.empty {
      opacity: 0.3;
    }
    
    /* Options */
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .option {
      padding: 14px 16px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .option:hover {
      border-color: var(--primary);
    }
    
    .option .letter {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--card-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 13px;
      flex-shrink: 0;
    }
    
    .option.selected {
      border-color: var(--primary);
      background: rgba(74, 144, 217, 0.1);
    }
    
    .option.correct {
      border-color: var(--success);
      background: rgba(82, 196, 26, 0.1);
    }
    
    .option.wrong {
      border-color: var(--error);
      background: rgba(255, 77, 79, 0.1);
    }
    
    .option.disabled {
      pointer-events: none;
      opacity: 0.7;
    }
    
    /* Judge Options */
    .judge-options {
      display: flex;
      gap: 12px;
    }
    
    .judge-option {
      flex: 1;
      padding: 16px;
      text-align: center;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border: 2px solid var(--border);
      background: var(--bg);
      transition: all 0.2s;
    }
    
    .judge-option:hover {
      border-color: var(--primary);
    }
    
    .judge-option.selected {
      border-color: var(--primary);
    }
    
    .judge-option.correct {
      border-color: var(--success);
      background: rgba(82, 196, 26, 0.1);
    }
    
    .judge-option.wrong {
      border-color: var(--error);
      background: rgba(255, 77, 79, 0.1);
    }
    
    /* Analysis */
    .analysis {
      margin-top: 16px;
      padding: 16px;
      background: linear-gradient(135deg, rgba(74, 144, 217, 0.05), rgba(107, 93, 211, 0.05));
      border-radius: 10px;
      border-left: 4px solid var(--primary);
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .analysis-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 8px;
    }
    
    .analysis-content {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-secondary);
    }
    
    .analysis-result {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    
    .analysis-result.correct {
      background: rgba(82, 196, 26, 0.1);
      color: var(--success);
    }
    
    .analysis-result.wrong {
      background: rgba(255, 77, 79, 0.1);
      color: var(--error);
    }
    
    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    
    .action-btn {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }
    
    .action-btn.primary {
      background: var(--primary);
      color: white;
    }
    
    .action-btn.secondary {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }
    
    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .action-btn.collected {
      background: var(--warning);
      color: white;
    }
    
    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card-bg);
      display: flex;
      border-top: 1px solid var(--border);
      padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .nav-item svg {
      width: 24px;
      height: 24px;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    
    .nav-item span {
      font-size: 11px;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    
    .nav-item.active svg {
      color: var(--primary);
    }
    
    .nav-item.active span {
      color: var(--primary);
      font-weight: 600;
    }
    
    .nav-badge {
      position: absolute;
      top: 2px;
      right: calc(50% - 20px);
      background: var(--error);
      color: white;
      font-size: 10px;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
    
    /* Page Sections */
    .page {
      display: none;
    }
    
    .page.active {
      display: block;
    }
    
    /* Case Page */
    .case-card {
      background: var(--card-bg);
      border-radius: 12px;
      margin: 12px 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    
    .case-header {
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), #6B5DD3);
      color: white;
    }
    
    .case-header h3 {
      font-size: 16px;
      margin-bottom: 8px;
    }
    
    .case-subjects {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    
    .case-subject-tag {
      padding: 4px 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      font-size: 11px;
    }
    
    .case-body {
      padding: 16px;
    }
    
    .case-description {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      margin-bottom: 16px;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
    }
    
    .case-question {
      margin-bottom: 16px;
    }
    
    .case-question-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .case-question-title .num {
      width: 24px;
      height: 24px;
      background: var(--primary);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    
    .case-answer-toggle {
      padding: 12px 16px;
      background: var(--bg);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--primary);
      transition: all 0.2s;
    }
    
    .case-answer-toggle:hover {
      background: rgba(74, 144, 217, 0.1);
    }
    
    .case-answer-toggle svg {
      transition: transform 0.3s;
    }
    
    .case-answer-toggle.expanded svg {
      transform: rotate(180deg);
    }
    
    .case-answer {
      padding: 12px;
      background: rgba(82, 196, 26, 0.05);
      border-radius: 8px;
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-secondary);
      border-left: 3px solid var(--success);
      display: none;
    }
    
    .case-answer.show {
      display: block;
      animation: slideIn 0.3s ease;
    }
    
    /* Error List Page */
    .list-header {
      padding: 12px 16px;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .list-header h3 {
      font-size: 15px;
    }
    
    .list-header .count {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 4px 10px;
      border-radius: 12px;
    }
    
    .list-item {
      background: var(--card-bg);
      margin: 8px 16px;
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .list-item:hover {
      transform: translateX(4px);
    }
    
    .list-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .list-item-content {
      font-size: 14px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .list-item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    /* Collect Page */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    
    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .empty-state h4 {
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--text);
    }
    
    .empty-state p {
      font-size: 14px;
    }
    
    /* Stats Page */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 12px 16px;
    }
    
    .stat-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    
    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }
    
    .stat-card .label {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .chart-section {
      background: var(--card-bg);
      margin: 12px 16px;
      border-radius: 12px;
      padding: 16px;
    }
    
    .chart-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    
    .subject-chart {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .subject-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .subject-row .label {
      width: 50px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .subject-row .bar-container {
      flex: 1;
      height: 24px;
      background: var(--bg);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    
    .subject-row .bar {
      height: 100%;
      border-radius: 12px;
      transition: width 0.5s ease;
      display: flex;
      align-items: center;
      padding-left: 10px;
    }
    
    .subject-row .bar .text {
      font-size: 11px;
      color: white;
      font-weight: 500;
      white-space: nowrap;
    }
    
    .subject-row .percent {
      width: 45px;
      text-align: right;
      font-size: 13px;
      font-weight: 600;
    }
    
    /* 未刷标签 */
    .not-done-tag {
      display: inline-block;
      background: #FF9C00;
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-right: 6px;
      font-weight: 600;
    }
    
    /* 显示答案按钮 */
    .reveal-btn {
      background: #722ED1 !important;
      color: white !important;
    }
    
    /* Theme Toggle */
    .theme-toggle {
      position: absolute;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 99;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .theme-toggle svg {
      width: 20px;
      height: 20px;
      color: var(--text);
    }
    
    /* Loading */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }
    
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    
    /* Toast */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      z-index: 1000;
      transition: transform 0.3s ease;
    }
    
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>🧬 生物医学大综合刷题</h1>
    <div class="header-stats">
      <span>📚 <span id="totalQuestions">350</span> 题</span>
      <span>⏱️ <span id="todayCount">0</span> 今日已做</span>
      <span>🎯 <span id="accuracy">0%</span> 正确率</span>
    </div>
    <!-- Theme Toggle -->
    <div class="theme-toggle" onclick="toggleTheme()">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </div>
  </div>
  
  <!-- Home Page (Dashboard) -->
  <div id="homePage" class="page active">
    <!-- Progress Ring -->
    <div class="progress-ring-container">
      <div class="progress-ring">
        <svg>
          <circle class="bg" cx="40" cy="40" r="32"></circle>
          <circle class="progress" id="mainProgress" cx="40" cy="40" r="32" stroke-dasharray="201" stroke-dashoffset="201"></circle>
        </svg>
        <div class="text">
          <div class="percent" id="mainPercent">0%</div>
          <div class="label">完成度</div>
        </div>
      </div>
      <div class="progress-details">
        <h3>各科进度</h3>
        <div class="progress-bars" id="progressBars"></div>
      </div>
    </div>

    <!-- Subject Cards -->

// LocalStorage 封装
const Storage = {
  get(key) {
    try {
      return localStorage.getItem(key);
    } catch (e) {
      console.warn('Storage get failed:', e);
      return null;
    }
  },
  
  set(key, value) {
    try {
      localStorage.setItem(key, value);
      return true;
    } catch (e) {
      console.warn('Storage set failed:', e);
      return false;
    }
  },
  
  remove(key) {
    try {
      localStorage.removeItem(key);
      return true;
    } catch (e) {
      console.warn('Storage remove failed:', e);
      return false;
    }
  },
  
  clear() {
    try {
      localStorage.clear();
      return true;
    } catch (e) {
      console.warn('Storage clear failed:', e);
      return false;
    }
  }
};

// 日期工具
const DateUtils = {
  format(date, format = 'YYYY-MM-DD') {
    const d = new Date(date);
    const year = d.getFullYear();
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    const hours = String(d.getHours()).padStart(2, '0');
    const minutes = String(d.getMinutes()).padStart(2, '0');
    const seconds = String(d.getSeconds()).padStart(2, '0');
    
    return format
      .replace('YYYY', year)
      .replace('MM', month)
      .replace('DD', day)
      .replace('HH', hours)
      .replace('mm', minutes)
      .replace('ss', seconds);
  },
  
  isToday(date) {
    const d = new Date(date);
    const today = new Date();
    return d.toDateString() === today.toDateString();
  },
  
  getDaysAgo(days) {
    const date = new Date();
    date.setDate(date.getDate() - days);
    return date.toDateString();
  }
};

// 字符串工具
const StringUtils = {
  truncate(str, length = 50, suffix = '...') {
    if (!str || str.length <= length) return str;
    return str.substring(0, length) + suffix;
  },
  
  escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  },
  
  highlight(text, keyword, color = '#FF9C00') {
    if (!keyword || !text) return text;
    const regex = new RegExp(`(${keyword})`, 'gi');
    return text.replace(regex, `<span style="background: ${color}; padding: 0 2px;">$1</span>`);
  }
};

// 数组工具
const ArrayUtils = {
  chunk(array, size) {
    const chunks = [];
    for (let i = 0; i < array.length; i += size) {
      chunks.push(array.slice(i, i + size));
    }
    return chunks;
  },
  
  unique(array) {
    return [...new Set(array)];
  },
  
  groupBy(array, key) {
    return array.reduce((result, item) => {
      const group = typeof key === 'function' ? key(item) : item[key];
      if (!result[group]) {
        result[group] = [];
      }
      result[group].push(item);
      return result;
    }, {});
  },
  
  shuffle(array) {
    const newArray = [...array];
    for (let i = newArray.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
    }
    return newArray;
  }
};

// 数学工具
const MathUtils = {
  clamp(value, min, max) {
    return Math.min(Math.max(value, min), max);
  },
  
  round(value, decimals = 0) {
    return Number(value.toFixed(decimals));
  },
  
  average(array) {
    if (array.length === 0) return 0;
    return array.reduce((sum, val) => sum + val, 0) / array.length;
  },
  
  percentage(value, total) {
    if (total === 0) return 0;
    return Math.round((value / total) * 100);
  }
};

// 防抖函数
function debounce(func, wait = 300) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}

// 节流函数
function throttle(func, limit = 300) {
  let inThrottle;
  return function executedFunction(...args) {
    if (!inThrottle) {
      func(...args);
      inThrottle = true;
      setTimeout(() => inThrottle = false, limit);
    }
  };
}

// 深拷贝
function deepClone(obj) {
  if (obj === null || typeof obj !== 'object') return obj;
  if (obj instanceof Date) return new Date(obj);
  if (obj instanceof Array) return obj.map(item => deepClone(item));
  if (obj instanceof Object) {
    const copy = {};
    Object.keys(obj).forEach(key => {
      copy[key] = deepClone(obj[key]);
    });
    return copy;
  }
  return obj;
}

// 生成唯一ID
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2);
}

// 判断是否为移动设备
function isMobile() {
  return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
}

// 获取设备安全区域
function getSafeArea() {
  const style = getComputedStyle(document.documentElement);
  return {
    top: parseInt(style.getPropertyValue('--safe-area-inset-top') || '0'),
    bottom: parseInt(style.getPropertyValue('--safe-area-inset-bottom') || '0'),
    left: parseInt(style.getPropertyValue('--safe-area-inset-left') || '0'),
    right: parseInt(style.getPropertyValue('--safe-area-inset-right') || '0')
  };
}

// 环形进度图
class ProgressRing {
  constructor(element, options = {}) {
    this.element = element;
    this.options = {
      size: options.size || 80,
      strokeWidth: options.strokeWidth || 8,
      color: options.color || '#4A90D9',
      bgColor: options.bgColor || '#E8E8E8',
      ...options
    };
    
    this.percent = 0;
    this.init();
  }
  
  init() {
    const { size, strokeWidth, bgColor } = this.options;
    const radius = (size - strokeWidth) / 2;
    const circumference = 2 * Math.PI * radius;
    
    this.element.innerHTML = `
      <svg width="${size}" height="${size}">
        <circle class="bg" cx="${size/2}" cy="${size/2}" r="${radius}" stroke="${bgColor}" stroke-width="${strokeWidth}" fill="none"/>
        <circle class="progress" cx="${size/2}" cy="${size/2}" r="${radius}" stroke="${this.options.color}" stroke-width="${strokeWidth}" fill="none" 
          stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}"/>
      </svg>
      <div class="text">
        <div class="percent">0%</div>
        <div class="label">完成</div>
      </div>
    `;
    
    this.progressCircle = this.element.querySelector('.progress');
    this.percentText = this.element.querySelector('.percent');
    this.circumference = circumference;
  }
  
  setProgress(percent) {
    this.percent = Math.max(0, Math.min(100, percent));
    const offset = this.circumference * (1 - this.percent / 100);
    
    this.progressCircle.style.strokeDashoffset = offset;
    this.percentText.textContent = Math.round(this.percent) + '%';
  }
}

// 条形进度图
class ProgressBar {
  constructor(element, options = {}) {
    this.element = element;
    this.options = {
      height: options.height || 8,
      color: options.color || '#4A90D9',
      bgColor: options.bgColor || '#E8E8E8',
      showText: options.showText !== false,
      ...options
    };
    
    this.percent = 0;
    this.init();
  }
  
  init() {
    this.element.innerHTML = `
      <div class="bar-track" style="height: ${this.options.height}px; background: ${this.options.bgColor}; border-radius: ${this.options.height/2}px; overflow: hidden;">
        <div class="bar-fill" style="height: 100%; width: 0%; background: ${this.options.color}; border-radius: ${this.options.height/2}px; transition: width 0.5s ease;"></div>
      </div>
      ${this.options.showText ? '<div class="bar-text" style="margin-top: 4px; font-size: 12px; color: #666;"></div>' : ''}
    `;
    
    this.fillElement = this.element.querySelector('.bar-fill');
    this.textElement = this.element.querySelector('.bar-text');
  }
  
  setProgress(percent, text = '') {
    this.percent = Math.max(0, Math.min(100, percent));
    this.fillElement.style.width = this.percent + '%';
    
    if (this.textElement && text) {
      this.textElement.textContent = text;
    }
  }
}

// 柱状图
class BarChart {
  constructor(element, options = {}) {
    this.element = element;
    this.options = {
      data: options.data || [],
      barWidth: options.barWidth || 24,
      barGap: options.barGap || 8,
      maxValue: options.maxValue || null,
      colors: options.colors || ['#4A90D9', '#52C41A', '#FF9C00', '#FF4D4F', '#722ED1', '#13C2C2'],
      showValues: options.showValues !== false,
      showLabels: options.showLabels !== false,
      ...options
    };
    
    this.data = this.options.data;
    this.init();
  }
  
  init() {
    this.render();
  }
  
  render() {
    if (!this.data || this.data.length === 0) {
      this.element.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无数据</div>';
      return;
    }
    
    const maxValue = this.options.maxValue || Math.max(...this.data.map(d => d.value));
    
    let html = `<div style="display: flex; align-items: flex-end; gap: ${this.options.barGap}px; height: 100%;">`;
    
    this.data.forEach((item, index) => {
      const height = (item.value / maxValue) * 100;
      const color = typeof item.color === 'string' ? item.color : this.options.colors[index % this.options.colors.length];
      
      html += `
        <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
          ${this.options.showValues ? `<span style="font-size: 11px; color: #666;">${item.value}</span>` : ''}
          <div style="width: 100%; height: ${height}%; min-height: 4px; background: linear-gradient(to top, ${color}, ${color}aa); border-radius: 4px 4px 0 0; transition: height 0.5s ease;"></div>
          ${this.options.showLabels ? `<span style="font-size: 10px; color: #999;">${item.label}</span>` : ''}
        </div>
      `;
    });
    
    html += '</div>';
    this.element.innerHTML = html;
  }
  
  setData(data) {
    this.data = data;
    this.render();
  }
}

// 饼图
class PieChart {
  constructor(element, options = {}) {
    this.element = element;
    this.options = {
      size: options.size || 120,
      data: options.data || [],
      colors: options.colors || ['#4A90D9', '#52C41A', '#FF9C00', '#FF4D4F', '#722ED1', '#13C2C2'],
      showLegend: options.showLegend !== false,
      ...options
    };
    
    this.data = this.options.data;
    this.init();
  }
  
  init() {
    this.render();
  }
  
  render() {
    if (!this.data || this.data.length === 0) {
      this.element.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无数据</div>';
      return;
    }
    
    const total = this.data.reduce((sum, item) => sum + item.value, 0);
    const { size } = this.options;
    const radius = size / 2;
    const cx = size / 2;
    const cy = size / 2;
    
    let paths = '';
    let currentAngle = -90;
    
    this.data.forEach((item, index) => {
      const percentage = total > 0 ? item.value / total : 0;
      const angle = percentage * 360;
      const endAngle = currentAngle + angle;
      
      if (percentage > 0) {
        const x1 = cx + radius * Math.cos(currentAngle * Math.PI / 180);
        const y1 = cy + radius * Math.sin(currentAngle * Math.PI / 180);
        const x2 = cx + radius * Math.cos(endAngle * Math.PI / 180);
        const y2 = cy + radius * Math.sin(endAngle * Math.PI / 180);
        
        const largeArc = angle > 180 ? 1 : 0;
        const color = typeof item.color === 'string' ? item.color : this.options.colors[index % this.options.colors.length];
        
        if (angle >= 360) {
          paths += `<circle cx="${cx}" cy="${cy}" r="${radius}" fill="${color}"/>`;
        } else {
          paths += `<path d="M${cx},${cy} L${x1},${y1} A${radius},${radius} 0 ${largeArc},1 ${x2},${y2} Z" fill="${color}"/>`;
        }
      }
      
      currentAngle = endAngle;
    });
    
    let legendHtml = '';
    if (this.options.showLegend) {
      legendHtml = '<div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px;">';
      this.data.forEach((item, index) => {
        const percentage = total > 0 ? Math.round(item.value / total * 100) : 0;
        const color = typeof item.color === 'string' ? item.color : this.options.colors[index % this.options.colors.length];
        legendHtml += `
          <div style="display: flex; align-items: center; gap: 4px; font-size: 12px;">
            <span style="width: 10px; height: 10px; border-radius: 2px; background: ${color};"></span>
            <span style="color: #666;">${item.label}</span>
            <span style="color: #999;">${percentage}%</span>
          </div>
        `;
      });
      legendHtml += '</div>';
    }
    
    this.element.innerHTML = `
      <div style="display: flex; flex-direction: column; align-items: center;">
        <svg width="${size}" height="${size}">${paths}</svg>
        ${legendHtml}
      </div>
    `;
  }
  
  setData(data) {
    this.data = data;
    this.render();
  }
}

}

// 选择学科
function selectSubject(subject) {

}

// 筛选题目类型
function filterByType(type) {
  state.currentType = type;
  
  // 更新按钮样式
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === type);

  renderQuestion();

// 设置模式
function setMode(mode) {
  state.currentMode = mode;
  
  // 更新按钮样式
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
  
  filterQuestions();
  renderQuestion();
}

// 筛选题目
function filterQuestions() {
  let filtered = [...state.questions];
  
  // 学科筛选
  if (state.currentSubject !== 'all') {
    filtered = filtered.filter(q => q.subject === state.currentSubject);
  }
  
  // 类型筛选
  if (state.currentType !== 'all') {
    filtered = filtered.filter(q => q.type === state.currentType);
  }
  
  // 随机/顺序
  if (state.currentMode === 'random') {
    filtered = shuffleArray(filtered);
  }
  
  state.filteredQuestions = filtered;
  state.currentQuestionIndex = 0;
  
  // 自动跳到第一个未答过的题
  var index = 0;
  while (index < filtered.length && state.answeredQuestions.has(filtered[index].id)) {
    index++;
  }
  state.currentQuestionIndex = index;
  
  renderQuestion();
}

// 渲染题目
function renderQuestion() {
  const container = document.getElementById('questionContainer');
  
  if (state.filteredQuestions.length === 0) {
    container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg><h4>暂无题目</h4><p>请选择其他筛选条件</p></div>';
    return;
  }
  
  const q = state.filteredQuestions[state.currentQuestionIndex];
  const subjectColor = SUBJECTS[q.subject]?.color || '#4A90D9';
  const isCollected = state.collectedQuestions.has(q.id);
  const isAnswered = state.answeredQuestions.has(q.id);
  
  // 设置答案是否已显示的初始状态：如果是已答过的题，默认未显示答案
  state.answerRevealed = isAnswered ? false : true;
  
  let optionsHtml = '';
  
  if (q.type === 'choice') {
    q.options.forEach((opt, i) => {
      const letter = String.fromCharCode(65 + i);
      var disabledClass = isAnswered ? 'disabled' : '';
      optionsHtml += '<div class="option ' + disabledClass + '" data-option="' + letter + '" onclick="selectOption(\'' + letter + '\')"><span class="letter">' + letter + '</span><span>' + opt + '</span></div>';
    });
  } else {
    var judgeDisabledClass = isAnswered ? 'disabled' : '';
    optionsHtml = '<div class="judge-options"><div class="judge-option ' + judgeDisabledClass + '" data-value="true" onclick="selectJudge(true)">✓ 正确</div><div class="judge-option ' + judgeDisabledClass + '" data-value="false" onclick="selectJudge(false)">✗ 错误</div></div>';
  }
  
  const starsHtml = Array(3).fill(0).map((_, i) => '<span class="star ' + (i < q.stars ? '' : 'empty') + '">★</span>').join('');
  
  // 未刷标签
  var notDoneTag = '';
  if (!isAnswered) {
    notDoneTag = '<span class="not-done-tag">未刷</span>';
  }
  
  // 显示答案按钮（仅已答过且未显示答案时显示）
  var revealBtn = '';
  if (isAnswered && !state.answerRevealed) {
    revealBtn = '<button class="action-btn reveal-btn" onclick="revealAnswer()">👁 显示答案</button>';
  }
  
  container.innerHTML = '<div class="question-card"><div class="question-header"><span class="question-subject" style="background: ' + subjectColor + '">' + (SUBJECTS[q.subject]?.name || q.subject) + '</span><span class="question-id">' + notDoneTag + (state.currentQuestionIndex + 1) + ' / ' + state.filteredQuestions.length + '</span></div><div class="question-stars">' + starsHtml + '</div><div class="question-content">' + q.question + '</div><div class="options">' + optionsHtml + '</div><div class="action-buttons">' + revealBtn + '<button class="action-btn ' + (isCollected ? 'collected' : 'secondary') + '" onclick="toggleCollect(' + q.id + ')">' + (isCollected ? '★ 已收藏' : '☆ 收藏') + '</button><button class="action-btn" style="background:#FF9C00; color:white;" onclick="markDontKnow(' + q.id + ')" ' + (isAnswered ? 'disabled style="display:none"' : '') + '>🤔 不会</button><button class="action-btn secondary" onclick="prevQuestion()" ' + (state.currentQuestionIndex === 0 ? 'disabled' : '') + '>← 上一题</button><button class="action-btn primary" onclick="nextQuestion()" ' + (state.currentQuestionIndex >= state.filteredQuestions.length - 1 ? 'disabled' : '') + '>下一题 →</button></div></div>';
  
  // 如果未答过题，自动显示答案
  if (!isAnswered) {
    showAnswer(q);
  }
}

// 手动显示答案（已答过的题点击按钮时调用）
function revealAnswer() {
  const q = state.filteredQuestions[state.currentQuestionIndex];
  state.answerRevealed = true;
  showAnswer(q);
  // 替换显示答案按钮为已显示状态
  var revealBtn = document.querySelector('.reveal-btn');
  if (revealBtn) {
    revealBtn.textContent = '✓ 答案已显示';
    revealBtn.disabled = true;
    revealBtn.style.opacity = '0.6';
  }
}

// 选择选项
function selectOption(letter) {
  const q = state.filteredQuestions[state.currentQuestionIndex];
  
  if (state.answeredQuestions.has(q.id)) return;
  
  // 标记已答
  state.answeredQuestions.add(q.id);
  
  // 记录今日统计
  recordTodayStat();
  
  // 判断对错
  const isCorrect = letter === q.answer;
  if (!isCorrect) {
    state.wrongQuestions.add(q.id);
  } else {
    // 答对了，从错题本移除
    if (state.wrongQuestions.has(q.id)) {
      state.wrongQuestions.delete(q.id);
      showToast('✓ 答对了！已从错题本移出');
    }
  }
  
  // 更新UI
  document.querySelectorAll('.option').forEach(opt => {
    opt.classList.add('disabled');
    if (opt.dataset.option === letter) {
      opt.classList.add(isCorrect ? 'correct' : 'wrong');
    }
    if (opt.dataset.option === q.answer) {
      opt.classList.add('correct');
    }
  });
  
  showAnswer(q, isCorrect ? null : letter);
  updateHeader();
  saveProgress();
}

// 选择判断
function selectJudge(value) {
  const q = state.filteredQuestions[state.currentQuestionIndex];
  
  if (state.answeredQuestions.has(q.id)) return;
  
  // 标记已答
  state.answeredQuestions.add(q.id);
  
  // 记录今日统计
  recordTodayStat();
  
  // 判断对错
  const isCorrect = value === q.answer;
  if (!isCorrect) {
    state.wrongQuestions.add(q.id);
  } else {
    // 答对了，从错题本移除
    if (state.wrongQuestions.has(q.id)) {
      state.wrongQuestions.delete(q.id);
      showToast('✓ 答对了！已从错题本移出');
    }
  }
  
  // 更新UI
  document.querySelectorAll('.judge-option').forEach(opt => {
    opt.classList.add('disabled');
    if (opt.dataset.value === String(value)) {
      opt.classList.add(isCorrect ? 'correct' : 'wrong');
    }
    if (opt.dataset.value === String(q.answer)) {
      opt.classList.add('correct');
    }
  });
  
  showAnswer(q, isCorrect ? null : value);
  updateHeader();
  saveProgress();
}

// 显示答案
function showAnswer(q, userAnswer = null) {
  const card = document.querySelector('.question-card');
  let resultText = '';
  
  if (q.type === 'choice') {
    const correctLetter = q.answer;
    resultText = `正确答案：${correctLetter}. ${q.options[correctLetter.charCodeAt(0) - 65]}`;
  } else {
    resultText = `正确答案：${q.answer ? '正确' : '错误'}`;
  }
  
  const isCorrect = userAnswer === null;
  
  const analysisHtml = `
    <div class="analysis">
      <div class="analysis-title">💡 解析</div>
      <div class="analysis-content">${q.analysis}</div>
      <div class="analysis-result ${isCorrect ? 'correct' : 'wrong'}">
        ${isCorrect ? '✓ 回答正确' : `✗ 回答错误${userAnswer !== null ? ` (选择了${q.type === 'choice' ? userAnswer : (userAnswer ? '正确' : '错误')})` : ''}`}
      </div>
      <div style="margin-top: 10px; font-size: 14px; color: #52C41A;">
        ${resultText}
      </div>
    </div>
  `;
  
  // 移除旧的analysis
  const oldAnalysis = card.querySelector('.analysis');
  if (oldAnalysis) oldAnalysis.remove();
  
  // 插入新的analysis
  const optionsEl = card.querySelector('.options');
  optionsEl.insertAdjacentHTML('afterend', analysisHtml);
}

// 上一题
function prevQuestion() {
  if (state.currentQuestionIndex > 0) {
    state.currentQuestionIndex--;
    renderQuestion();
  }
}

// 下一题
function nextQuestion() {
  if (state.currentQuestionIndex < state.filteredQuestions.length - 1) {
    state.currentQuestionIndex++;
    renderQuestion();
  }
}

// 收藏切换
function toggleCollect(id) {
  if (state.collectedQuestions.has(id)) {
    state.collectedQuestions.delete(id);
    showToast('已取消收藏');
  } else {
    state.collectedQuestions.add(id);
    showToast('已添加收藏');
  }
  saveProgress();
  renderQuestion();
  renderCollectList();
}

// 跳转到指定题目
function jumpToQuestion(id) {
  const q = state.questions.find(q => q.id === id);
  if (!q) return;
  
  state.currentSubject = q.subject;
  state.currentType = q.type;
  state.currentMode = 'order';
  
  // 更新UI
  document.querySelectorAll('.tabs .tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.subject === q.subject);
  });
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === q.type);
  });
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === 'order');
  });
  
  filterQuestions();
  
  const index = state.filteredQuestions.findIndex(q => q.id === id);
  if (index !== -1) {
    state.currentQuestionIndex = index;
  }
  
  renderQuestion();
  switchPage('quizPage');
}

// 从错题中移除
function removeFromErrors(id) {
  state.wrongQuestions.delete(id);
  saveProgress();
  renderErrorList();
  updateHeader();
  showToast('已从错题本移除');
}

// 标记"不会"
function markDontKnow(id) {
  const q = state.filteredQuestions[state.currentQuestionIndex];
  if (state.answeredQuestions.has(q.id)) return;
  
  // 标记已答
  state.answeredQuestions.add(q.id);
  // 记入错题
  state.wrongQuestions.add(q.id);
  recordTodayStat();
  
  // 显示正确答案和解析
  if (q.type === 'choice') {
    document.querySelectorAll('.option').forEach(function(opt) {
      opt.classList.add('disabled');
      if (opt.dataset.option === q.answer) {
        opt.classList.add('correct');
      }
    });
  } else {
    document.querySelectorAll('.judge-option').forEach(function(opt) {
      opt.classList.add('disabled');
      if (opt.dataset.value === String(q.answer)) {
        opt.classList.add('correct');
      }
    });
  }
  
  showAnswer(q, 'dontKnow');
  updateHeader();
  saveProgress();
  
  // 隐藏"不会"按钮
  var btns = document.querySelectorAll('.action-btn');
  btns.forEach(function(btn) {
    if (btn.textContent.indexOf('不会') !== -1) {
      btn.style.display = 'none';
    }
  });
}

// 一键重刷错题
function retryErrors() {
  if (state.wrongQuestions.size === 0) {
    showToast('没有错题可重刷');
    return;
  }
  
  // 筛选出所有错题
  var errorQuestions = state.questions.filter(function(q) {
    return state.wrongQuestions.has(q.id);
  });
  
  // 把这些题从answeredQuestions中移除，以便重新作答
  errorQuestions.forEach(function(q) {
    state.answeredQuestions.delete(q.id);
    state.wrongQuestions.delete(q.id);
  });
  
  // 设置筛选为全部学科、顺序模式
  state.filteredQuestions = errorQuestions;
  state.currentQuestionIndex = 0;
  state.currentSubject = 'all';
  state.currentType = 'all';
  state.currentMode = 'order';
  
  // 更新UI
  document.querySelectorAll('.tabs .tab').forEach(function(tab) {
    tab.classList.toggle('active', tab.dataset.subject === 'all');
  });
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.type === 'all');
  });
  document.querySelectorAll('.mode-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.mode === 'order');
  });
  
  renderQuestion();
  switchPage('quizPage');
  showToast('开始重刷 ' + errorQuestions.length + ' 道错题，答对自动移出！');
}

// 渲染统计页面
function renderStats() {
  // 基本统计
  const totalAnswered = state.answeredQuestions.size;
  const totalCorrect = totalAnswered - state.wrongQuestions.size;
  const accuracy = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
  
  document.getElementById('statTotal').textContent = totalAnswered;
  document.getElementById('statCorrect').textContent = totalCorrect;
  document.getElementById('statAccuracy').textContent = accuracy + '%';
  document.getElementById('statToday').textContent = state.todayStats.count;
  
  // 各科正确率图表
  renderSubjectChart();
  
  // 每日做题统计
  renderDailyChart();
}

// 渲染学科图表
function renderSubjectChart() {
  const container = document.getElementById('subjectChart');
  let html = '';
  
  const subjectKeys = ['anatomy', 'physiology', 'biochemistry', 'pathology', 'pathophys', 'pharmacology'];
  
  subjectKeys.forEach(key => {
    const subjectQuestions = state.questions.filter(q => q.subject === key);
    const total = subjectQuestions.length;
    const answered = subjectQuestions.filter(q => state.answeredQuestions.has(q.id)).length;
    const wrong = subjectQuestions.filter(q => state.wrongQuestions.has(q.id)).length;
    const correct = answered - wrong;
    const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
    const color = SUBJECTS[key].color;
    const barWidth = answered > 0 ? (answered / total) * 100 : 0;
    
    html += `
      <div class="subject-row">
        <span class="label">${SUBJECTS[key].name}</span>
        <div class="bar-container">
          <div class="bar" style="width: ${barWidth}%; background: ${color};">
            ${answered > 0 ? `<span class="text">${correct}/${answered}</span>` : ''}
          </div>
        </div>
        <span class="percent" style="color: ${color}">${accuracy}%</span>
      </div>
    `;
  });
  
  container.innerHTML = html;
}

// 渲染每日图表
function renderDailyChart() {
  const container = document.getElementById('dailyChart');
  const days = 7;
  const chartData = [];
  
  for (let i = days - 1; i >= 0; i--) {
    const date = new Date();
    date.setDate(date.getDate() - i);
    const dateStr = date.toDateString();
    const dayData = state.dailyStats[dateStr] || { count: 0 };
    chartData.push({
      date: date.getDate() + '日',
      count: dayData.count
    });
  }
  
  const maxCount = Math.max(...chartData.map(d => d.count), 1);
  
  let html = '';
  chartData.forEach(d => {
    const height = (d.count / maxCount) * 120;
    html += `
      <div style="flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
        <div style="width: 100%; height: ${height}px; min-height: 4px; background: linear-gradient(to top, var(--primary), #6B5DD3); border-radius: 4px 4px 0 0;"></div>
        <span style="font-size: 10px; color: var(--text-secondary);">${d.date}</span>
        <span style="font-size: 10px; color: var(--text);">${d.count}</span>
      </div>
    `;
  });
  
  container.innerHTML = html;
}

// 记录今日统计
function recordTodayStat() {
  const today = new Date().toDateString();
  
  if (state.todayStats.date !== today) {
    // 新的一天，保存昨天的数据
    state.dailyStats[state.todayStats.date] = {
      count: state.todayStats.count,
      correct: state.todayStats.correct
    };
    
    // 重置今日统计
    state.todayStats = { date: today, count: 0, correct: 0 };
  }
  
  state.todayStats.count++;
  
  const q = state.filteredQuestions[state.currentQuestionIndex];
  if (q) {
    const isCorrect = state.currentSubject !== 'all' || !state.wrongQuestions.has(q.id);
    // 检查是否答对（简化判断）
    if (document.querySelector('.analysis-result.correct')) {
      state.todayStats.correct++;
    }
  }
}

// 更新头部统计
function updateHeader() {
  const totalAnswered = state.answeredQuestions.size;
  const totalQuestions = state.questions.length;
  const totalCorrect = totalAnswered - state.wrongQuestions.size;
  const accuracy = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
  
  document.getElementById('totalQuestions').textContent = totalQuestions;
  document.getElementById('todayCount').textContent = state.todayStats.count;
  document.getElementById('accuracy').textContent = accuracy + '%';
  
  // 更新环形进度
  const progress = totalQuestions > 0 ? (totalAnswered / totalQuestions) : 0;
  const circumference = 2 * Math.PI * 32;
  const offset = circumference * (1 - progress);
  
  document.getElementById('mainProgress').style.strokeDashoffset = offset;
  document.getElementById('mainProgress').style.stroke = '#4A90D9';
  document.getElementById('mainPercent').textContent = Math.round(progress * 100) + '%';
  
  // 更新进度条
  renderProgressBars();
}

// 切换页面
function switchPage(pageName) {
  state.currentPage = pageName;
  
  // 更新导航 - 首页tab在homePage和quizPage都高亮
  document.querySelectorAll('.nav-item').forEach(item => {
    var p = item.dataset.page;
    var isActive = (p === pageName) || (p === 'homePage' && pageName === 'quizPage');
    item.classList.toggle('active', isActive);
  });
  
  // 更新页面显示
  document.querySelectorAll('.page').forEach(page => {
    page.classList.toggle('active', page.id === pageName);
  });
  
  // 刷新页面数据
  if (pageName === 'homePage') {
    renderSubjectCards();
    renderProgressBars();
    updateHeader();
  } else if (pageName === 'quizPage') {
    filterQuestions();
  } else if (pageName === 'errorPage') {
    renderErrorList();
  } else if (pageName === 'collectPage') {
    renderCollectList();
  } else if (pageName === 'statsPage') {
    renderStats();
  }
}

// 切换主题
function toggleTheme() {
  const currentTheme = document.documentElement.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  Storage.set('theme', newTheme);
  updateThemeIcon();
}

// 更新主题图标
function updateThemeIcon() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const icon = document.getElementById('themeIcon');
  
  if (isDark) {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
  } else {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
  }
}

// Toast提示
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  
  setTimeout(() => {
    toast.classList.remove('show');
  }, 2000);
}

// 工具函数：打乱数组
function shuffleArray(array) {
  const newArray = [...array];
  for (let i = newArray.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
  }
  return newArray;
}

// 保存进度
function saveProgress() {
  const data = {
    answeredQuestions: Array.from(state.answeredQuestions),
    wrongQuestions: Array.from(state.wrongQuestions),
    collectedQuestions: Array.from(state.collectedQuestions),
    todayStats: state.todayStats,
    dailyStats: state.dailyStats
  };
  
  Storage.set('progress', JSON.stringify(data));
}

// 加载进度
function loadProgress() {
  try {
    const data = JSON.parse(Storage.get('progress') || '{}');
    
    if (data.answeredQuestions) {
      state.answeredQuestions = new Set(data.answeredQuestions);
    }
    if (data.wrongQuestions) {
      state.wrongQuestions = new Set(data.wrongQuestions);
    }
    if (data.collectedQuestions) {
      state.collectedQuestions = new Set(data.collectedQuestions);
    }
    if (data.todayStats) {
      state.todayStats = data.todayStats;
    }
    if (data.dailyStats) {
      state.dailyStats = data.dailyStats;
    }
    
    // 检查是否新的一天
    const today = new Date().toDateString();
    if (state.todayStats.date !== today) {
      // 保存昨天的数据
      if (state.todayStats.count > 0) {
        state.dailyStats[state.todayStats.date] = {
          count: state.todayStats.count,
          correct: state.todayStats.correct
        };
      }
      
      // 重置今日统计
      state.todayStats = { date: today, count: 0, correct: 0 };
    }
  } catch (e) {
    console.log('加载进度失败', e);
  }
}

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', init);

  // ==================== END OF DATA ====================
  </script>
